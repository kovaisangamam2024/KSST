<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KSST Seva Allocation Tool</title>

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
margin:0;
background:#f4f6f9;
color:#333;
}

header{
background:#7a0c18;
color:white;
padding:20px;
text-align:center;
}

.logo{
height:70px;
margin-bottom:10px;
}

.container{
max-width:1000px;
margin:auto;
padding:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

h2{
margin-top:0;
}

textarea{
width:100%;
height:120px;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

input[type=file]{
margin-top:10px;
}

button{
background:#7a0c18;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#a11528;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#eee;
}

.footer{
text-align:center;
font-size:14px;
margin-top:30px;
color:#777;
}

</style>
</head>

<body>

<header>
<img src="ksstlogo.png" class="logo">
<h1>KSST Seva Allocation Tool</h1>
<p>Kovai Swaminama Smarana Trust</p>
</header>

<div class="container">

<div class="card">

<h2>Devotee Names</h2>

<p>Enter one name per line</p>

<textarea id="names"></textarea>

<p>Or Upload CSV</p>

<input type="file" id="csvFile">

</div>


<div class="card">

<h2>Seva / Tasks</h2>

<p>Enter one task per line</p>

<textarea id="tasks"></textarea>

</div>


<div class="card">

<button onclick="allocate()">Allocate Seva</button>
<button onclick="shuffleNames()">Shuffle Names</button>
<button onclick="downloadCSV()">Download CSV</button>
<button onclick="copyResults()">Copy Results</button>

<div id="resultTable"></div>

</div>

<div class="footer">
KSST Devotional Utility Tool
</div>

</div>

<script>

let allocationData=[];

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

function shuffleNames(){

let names=document.getElementById("names").value.split("\n").filter(n=>n.trim()!="");
names=shuffle(names);

document.getElementById("names").value=names.join("\n");

}

function allocate(){

let names=document.getElementById("names").value.split("\n").filter(n=>n.trim()!="");
let tasks=document.getElementById("tasks").value.split("\n").filter(t=>t.trim()!="");

if(names.length===0||tasks.length===0){
alert("Please enter names and tasks");
return;
}

names=shuffle(names);

allocationData=[];

for(let i=0;i<names.length;i++){

let task=tasks[i%tasks.length];

allocationData.push({
name:names[i],
task:task
});

}

renderTable();

}

function renderTable(){

let html="<table><tr><th>Devotee</th><th>Seva</th></tr>";

allocationData.forEach(r=>{
html+=<tr><td>${r.name}</td><td>${r.task}</td></tr>;
});

html+="</table>";

document.getElementById("resultTable").innerHTML=html;

}

document.getElementById("csvFile").addEventListener("change",function(e){

let file=e.target.files[0];
if(!file)return;

let reader=new FileReader();

reader.onload=function(e){

let text=e.target.result;
document.getElementById("names").value=text;

};

reader.readAsText(file);

});

function downloadCSV(){

if(allocationData.length===0){
alert("No data");
return;
}

let csv="Devotee,Seva\n";

allocationData.forEach(r=>{
csv+=${r.name},${r.task}\n;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="ksst_allocation.csv";
a.click();

}

function copyResults(){

let text="KSST Seva Allocation\n\n";

allocationData.forEach(r=>{
text+=${r.name} → ${r.task}\n;
});

navigator.clipboard.writeText(text);

alert("Results copied");

}

</script>

</body>
</html>
